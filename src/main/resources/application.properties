spring.application.name=ms-alertas
server.port=8087

# ========================================================================
# H2 EN MEMORIA: ideal para alertas (notificaciones temporales).
# ========================================================================
spring.datasource.url=jdbc:h2:mem:alertasdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Consola web de H2 (http://localhost:8084/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Healthchecks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logs
logging.level.cl.duoc.vientosur=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
